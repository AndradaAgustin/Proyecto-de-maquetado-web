<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP</title>
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
</head>
<body>
<div class="background">
    <div class="container">
    <header>
        <img src="./assets/images/Copilot_20260526_233650-removebg-preview.png" alt="Logo">
        <p>Character Counter</p>
    </header>

    <div>
        <h1>Analyze your text in real-time.</h1>
        <textarea id="Text" placeholder="Type your text here..."></textarea>
    </div>

    <div class="options">
        <label>
            <input type="checkbox" id="analyzeText" class="excludeSpaces">
            Exclude Spaces
        </label>

        <label>
            <input type="checkbox" id="analyzeText">
            Set Character Limit
        </label>

        <p class="timer">Approx. reading time: <1 minute </p>
    </div>
</div>
</div>

</body>
</html>
