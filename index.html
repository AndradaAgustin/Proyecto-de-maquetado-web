<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP</title>
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
</head>
<body>
<div class="background">
    <div class="container">
    <header>
        <div class="logo">
        <img src="./assets/images/Copilot_20260526_233650-removebg-preview.png" alt="Logo">
        <p>Character Counter</p>
        </div>

        <button class="change-color">
        <img src="./assets/images/sun.png" alt="Boton">
        </button>
        
    </header>

    <div>
        <h1>Analyze your text in real-time.</h1>
        <textarea id="Text" placeholder="Type your text here..."></textarea>
    </div>

    <div class="options">
        <label>
            <input type="checkbox" class="check">
            Exclude Spaces
        </label>

        <label>
            <input type="checkbox" class="check">
            Set Character Limit
        </label>

        <p class="timer">Approx. reading time: &lt;1 minute </p>
    </div>

    <div class="stats">
    <div class="purple-card">
            <h2 class="count">278</h2>
            <p>Total Characters</p>
    </div>

    <div class="orange-card">
            <h2 class="count">39</h2>
            <p>Word Count</p>
    </div>

    <div class="red-card">
            <h2 class="count">04</h2>
            <p>Sentence Count</p>
    </div>
    </div>
    <div class="metrics">
        <h3 class="density">Letter Density</h3>

        <div class="bars">
        <span>E</span>
        <progress max="100" value="40">40%</progress>
        <span>40 (16.06%)</span>
        </div>

        <div class="bars">
        <span>I</span>
        <progress max="100" value="29">29%</progress>
        <span>29 (11.65%)</span>
        </div>

        <div class="bars">
        <span>T</span>
        <progress max="100" value="28">28%</progress>
        <span>28 (11.24%)</span>
        </div>

        <div class="bars">
        <span>O</span>
        <progress max="100" value="22">22%</progress>
        <span>22 (8.84%)</span>
        </div>

        <div class="bars">
        <span>N</span>
        <progress max="100" value="21">21%</progress>
        <span>21 (8.43%)</span>
        </div>
        
    </div>
</div>
</div>

</body>
</html>
